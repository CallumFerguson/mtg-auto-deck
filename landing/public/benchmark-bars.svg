<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Generic benchmark bar graph</title>
  <desc id="desc">A dark chart panel with rising cyan and green bars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="0.52" stop-color="#0b1020" />
      <stop offset="1" stop-color="#05070d" />
    </linearGradient>
    <linearGradient id="barCyan" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc" />
      <stop offset="1" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="barGreen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6ee7b7" />
      <stop offset="1" stop-color="#10b981" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32" />
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />
  <circle cx="1030" cy="98" r="176" fill="#0ea5e9" opacity="0.13" />
  <circle cx="158" cy="568" r="216" fill="#10b981" opacity="0.1" />
  <g filter="url(#softShadow)">
    <rect x="132" y="88" width="936" height="500" rx="28" fill="#101827" opacity="0.86" />
    <rect x="132.5" y="88.5" width="935" height="499" rx="27.5" fill="none" stroke="#e2e8f0" stroke-opacity="0.13" />
  </g>
  <g stroke="#e2e8f0" stroke-opacity="0.12" stroke-width="2">
    <path d="M214 180H996" />
    <path d="M214 260H996" />
    <path d="M214 340H996" />
    <path d="M214 420H996" />
    <path d="M214 500H996" />
  </g>
  <g fill="#7d8ca1" opacity="0.55">
    <rect x="214" y="516" width="782" height="2" />
    <rect x="214" y="180" width="2" height="338" />
  </g>
  <g>
    <rect x="260" y="392" width="70" height="124" rx="12" fill="url(#barCyan)" />
    <rect x="370" y="340" width="70" height="176" rx="12" fill="url(#barGreen)" />
    <rect x="480" y="286" width="70" height="230" rx="12" fill="url(#barCyan)" />
    <rect x="590" y="248" width="70" height="268" rx="12" fill="url(#barGreen)" />
    <rect x="700" y="204" width="70" height="312" rx="12" fill="url(#barCyan)" />
    <rect x="810" y="158" width="70" height="358" rx="12" fill="url(#barGreen)" />
  </g>
  <path d="M294 392C390 362 448 300 515 286C592 270 630 225 699 204C774 181 811 165 846 158" fill="none" stroke="#f8c471" stroke-width="8" stroke-linecap="round" opacity="0.8" />
  <g fill="#f8fafc">
    <rect x="214" y="132" width="222" height="18" rx="9" opacity="0.9" />
    <rect x="214" y="158" width="142" height="12" rx="6" opacity="0.38" />
  </g>
</svg>
